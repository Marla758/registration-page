<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 20px;
        }
        .form-container {
            background: white;
            width: 450px;
            margin: auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        .message-box {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            background: #f9f9f9;
            border-left: 4px solid #007bff;
        }
        .error {
            background: #ffe6e6;
            border-left-color: red;
            color: #cc0000;
        }
        .success {
            background: #e6ffe6;
            border-left-color: green;
            color: #006600;
        }
        .info {
            background: #eef;
            margin-top: 20px;
            padding: 10px;
            font-size: 13px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Register</h2>

    <form onsubmit="return checkForm()">
        <div class="input-group">
            <label>Username:</label>
            <input type="text" id="user" placeholder="at least 4 characters">
        </div>

        <div class="input-group">
            <label>Password:</label>
            <input type="password" id="pass" placeholder="min 8 chars, letters + numbers">
        </div>

        <div class="input-group">
            <label>Confirm Password:</label>
            <input type="password" id="confirmPass" placeholder="type password again">
        </div>

        <div class="input-group">
            <label>Email:</label>
            <input type="email" id="emailAddr" placeholder="name@example.com">
        </div>

        <div class="input-group">
            <label>Date of Birth:</label>
            <input type="date" id="birthDate">
        </div>

        <button type="submit">Submit</button>
    </form>

    <div id="resultMessage" class="message-box">
        Fill all fields and click Submit.
    </div>

    <div class="info">
        <strong>Form Validations:</strong>
        <ul>
            <li>All fields must be filled</li>
            <li>Username must have at least 4 characters</li>
            <li>Password must be at least 8 chars, letters + numbers</li>
            <li>Password and Confirm Password match</li>
            <li>Valid email format</li>
            <li>Date of Birth not in future</li>
        </ul>
    </div>
</div>

<script>
    // Function runs when form is submitted
    function checkForm() {
        // Get input values
        let username = document.getElementById("user").value;
        let password = document.getElementById("pass").value;
        let confirmPwd = document.getElementById("confirmPass").value;
        let email = document.getElementById("emailAddr").value;
        let dob = document.getElementById("birthDate").value;

        let errorsList = [];

        // Check empty fields
        if (username === "") errorsList.push("Username is required.");
        if (password === "") errorsList.push("Password is required.");
        if (confirmPwd === "") errorsList.push("Please confirm your password.");
        if (email === "") errorsList.push("Email is required.");
        if (dob === "") errorsList.push("Date of Birth is required.");

        // Username length
        if (username !== "" && username.length < 4) {
            errorsList.push("Username must be at least 4 characters.");
        }

        // Password strength
        if (password !== "") {
            if (password.length < 8) {
                errorsList.push("Password must be at least 8 characters long.");
            }
            let hasLetter = false;
            let hasNumber = false;
            for (let i = 0; i < password.length; i++) {
                let ch = password[i];
                if ((ch >= 'a' && ch <= 'z') || (ch >= 'A' && ch <= 'Z')) hasLetter = true;
                if (ch >= '0' && ch <= '9') hasNumber = true;
            }
            if (!hasLetter || !hasNumber) {
                errorsList.push("Password must have both letters and numbers.");
            }
        }

        // Password match
        if (password !== "" && confirmPwd !== "" && password !== confirmPwd) {
            errorsList.push("Password and Confirm Password do not match.");
        }

        // Email format
        let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (email !== "" && !emailPattern.test(email)) {
            errorsList.push("Enter a valid email (like name@domain.com).");
        }

        // Date not in future
        if (dob !== "") {
            let selectedDate = new Date(dob);
            let todayDate = new Date();
            todayDate.setHours(0, 0, 0, 0);
            if (selectedDate > todayDate) {
                errorsList.push("Date of Birth cannot be in the future.");
            }
        }

        // Show result and clear fields on success
        let msgDiv = document.getElementById("resultMessage");
        if (errorsList.length === 0) {
            // Success: clear all input fields
            document.getElementById("user").value = "";
            document.getElementById("pass").value = "";
            document.getElementById("confirmPass").value = "";
            document.getElementById("emailAddr").value = "";
            document.getElementById("birthDate").value = "";
            
            msgDiv.innerHTML = "✅ Registration successful! Form cleared.";
            msgDiv.className = "message-box success";
        } else {
            // Show errors
            let errorText = "<strong>Fix these errors:</strong><br>";
            for (let i = 0; i < errorsList.length; i++) {
                errorText += "• " + errorsList[i] + "<br>";
            }
            msgDiv.innerHTML = errorText;
            msgDiv.className = "message-box error";
        }

        return false;  // Prevent page refresh
    }
</script>
</body>
</html>
